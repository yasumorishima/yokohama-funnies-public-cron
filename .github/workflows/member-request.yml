name: Member Request Issue

on:
  repository_dispatch:
    types: [member-request]

permissions:
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    env:
      PRIVATE_REPO: yasumorishima/yokohama-funnies
    steps:
      - name: Mint GitHub App token (scoped to private funnies repo)
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.FUNNIES_APP_ID }}
          private-key: ${{ secrets.FUNNIES_APP_PRIVATE_KEY }}
          owner: yasumorishima
          repositories: yokohama-funnies

      - name: Create issue in private funnies repo
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          NAME: ${{ github.event.client_payload.name }}
          JERSEY: ${{ github.event.client_payload.jersey_number }}
          EMAIL: ${{ github.event.client_payload.email }}
        run: |
          set -euo pipefail
          NAME_DISPLAY="${NAME:-(名前未入力)}"
          JERSEY_DISPLAY="${JERSEY:-(未指定)}"
          EMAIL_DISPLAY="${EMAIL:-(取得失敗)}"
          TITLE="[会員申請] ${NAME_DISPLAY} (背番号 ${JERSEY_DISPLAY})"
          BODY=$(cat <<BODYEOF
          ## 会員申請が届きました

          - **氏名**: ${NAME_DISPLAY}
          - **背番号**: ${JERSEY_DISPLAY}
          - **メールアドレス**: ${EMAIL_DISPLAY}

          ---

          ### 次のアクション
          1. 申請者本人と確認 (チームメンバーであるか / 別人なりすましでないか)
          2. /admin/roles で適切な role (viewer / member / editor / admin) を付与
          3. 完了後この issue を close

          自動生成: gas-member-form (onFormSubmit) → Vercel proxy → public-cron repository_dispatch
          BODYEOF
          )
          gh issue create \
            --repo "${PRIVATE_REPO}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --label "member-request"

      - name: Auto-link roster player by jersey number (best-effort)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EMAIL: ${{ github.event.client_payload.email }}
          JERSEY: ${{ github.event.client_payload.jersey_number }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, json, urllib.request, urllib.error
          base = (os.environ.get("SUPABASE_URL") or "").rstrip("/")
          key = os.environ.get("SUPABASE_SERVICE_ROLE_KEY") or ""
          email = (os.environ.get("EMAIL") or "").strip().lower()
          jersey = (os.environ.get("JERSEY") or "").strip()
          if not base or not key:
              print("skip: SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY unset"); raise SystemExit(0)
          if not email or not jersey or not jersey.isdigit():
              print("skip: email missing or jersey non-numeric (jersey=%r)" % jersey); raise SystemExit(0)
          H = {"apikey": key, "Authorization": "Bearer " + key, "Content-Type": "application/json"}
          # 1. find auth uid by email (admin list users, client-side filter)
          try:
              req = urllib.request.Request(base + "/auth/v1/admin/users?per_page=1000", headers=H)
              data = json.loads(urllib.request.urlopen(req).read())
          except urllib.error.HTTPError as e:
              print("::warning::auth list failed %d %s" % (e.code, e.read().decode()[:200])); raise SystemExit(0)
          users = data.get("users", data if isinstance(data, list) else [])
          uid = None
          for u in users:
              if (u.get("email") or "").lower() == email:
                  uid = u.get("id"); break
          if not uid:
              print("skip: no auth user for email yet (applicant not logged in to site)"); raise SystemExit(0)
          # 2. link players row by jersey, only if currently unlinked + not deleted
          patch = base + "/rest/v1/players?jersey_number=eq." + jersey + "&user_id=is.null&deleted_at=is.null"
          ph = dict(H); ph["Prefer"] = "return=representation"
          try:
              req = urllib.request.Request(patch, data=json.dumps({"user_id": uid}).encode(), headers=ph, method="PATCH")
              res = json.loads(urllib.request.urlopen(req).read())
          except urllib.error.HTTPError as e:
              print("::warning::players patch failed %d %s" % (e.code, e.read().decode()[:200])); raise SystemExit(0)
          if res:
              print("linked: players jersey %s -> uid %s" % (jersey, uid[:8]))
          else:
              print("skip: no unlinked players row with jersey %s (already linked or not on roster)" % jersey)
          PY
