name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      memo:
        description: "実行メモ"
        required: false

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: curl /schedule (SSR triggers Supabase fetch, no anon key needed)
        run: |
          HTTP_CODE=$(curl --max-time 60 -sS -o /dev/null -w "%{http_code}" "${{ secrets.VERCEL_APP_URL }}/schedule")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]
          then
            echo "::error::keep-alive ping returned non-200"
            exit 1
          fi
